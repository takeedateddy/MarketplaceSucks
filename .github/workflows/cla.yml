name: "CLA Assistant"
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]
permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write
jobs:
  CLAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://github.com/takeedateddy/MarketplaceSucks/blob/main/CLA.md'
          branch: 'main'
          allowlist: dependabot[bot],github-actions[bot],noreply@anthropic.com
          custom-notsigned-prcomment: |
            Thank you for your contribution! Before we can merge this PR, you need to sign our [Contributor License Agreement](https://github.com/takeedateddy/MarketplaceSucks/blob/main/CLA.md).

            To sign, please comment on this PR with exactly:

            `I have read the CLA Document and I hereby sign the CLA`

            This is a one-time requirement. Once signed, it covers all future contributions to this project.
          custom-allsigned-prcomment: |
            All contributors have signed the CLA. Thank you!
