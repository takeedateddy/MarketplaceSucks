<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#E04F5F" />
  <!-- Shopping cart icon -->
  <g transform="translate(24, 28)" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Cart body -->
    <path d="M10 20 L18 4 L62 4 L70 20" />
    <path d="M10 20 L14 56 L66 56 L70 20" />
    <!-- Cart handle -->
    <path d="M18 4 L10 4" />
    <!-- X mark (the "sucks" part) -->
