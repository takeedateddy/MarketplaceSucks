    <line x1="52" y1="28" x2="28" y2="48" stroke="#FFFFFF" stroke-width="6" />
    <!-- Wheels -->
    <circle cx="26" cy="64" r="5" fill="#FFFFFF" stroke="none" />
    <circle cx="54" cy="64" r="5" fill="#FFFFFF" stroke="none" />
  </g>
</svg>
